

<script>
    
    class Person {
        constructor(name, age) {
            this.name = name;
            this.age = age;
        }

        greet() {
            console.log(`Hello, my name is ${this.name} and I am ${this.age} years old.`);
        }
    }


    // Creating an instance of the Person class
    let person1 = new Person('Alice', 40);
    person1.greet();
</script>
